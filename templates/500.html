<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>500 – Server Error | GaonKaam</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--earth:#3D2B1F;--clay:#C1440E;--gold:#E8A020;--white:#FDFAF5;--muted:#8A7060;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--white);color:var(--earth);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
  .wrap{text-align:center;max-width:480px;}
  .code{font-size:96px;font-weight:800;color:var(--clay);line-height:1;letter-spacing:-4px;}
  .icon{font-size:64px;margin:12px 0;}
  h1{font-size:24px;font-weight:800;margin-bottom:8px;}
  p{color:var(--muted);font-size:15px;line-height:1.7;margin-bottom:28px;}
  .btn{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;border-radius:10px;font-size:14px;font-weight:600;background:var(--clay);color:white;text-decoration:none;}
  .btn:hover{background:#A33A0C;}
</style>
</head>
<body>
<div class="wrap">
  <div class="code">500</div>
  <div class="icon">⚙️</div>
  <h1>Something Went Wrong</h1>
  <p>Our server hit an unexpected error. We're working on fixing it. Please try again in a few moments.</p>
  <a href="/" class="btn">🏠 Go Home</a>
</div>
</body>
</html>
